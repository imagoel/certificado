services:
  certificado-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certificado-web
    restart: unless-stopped
    ports:
      - "28754:80"
    depends_on:
      - certificado-api

  certificado-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: certificado-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CODE_PREFIX: ${CODE_PREFIX:-ABC}
      PUBLIC_VALIDATION_BASE_URL: ${PUBLIC_VALIDATION_BASE_URL:-http://localhost:29180/validar}
      CERTIFICADOS_MEDIA_DIR: /app/data/certificados
      CERTIFICADOS_MAX_UPLOAD_BYTES: ${CERTIFICADOS_MAX_UPLOAD_BYTES:-5242880}
      SESSION_SECRET: ${SESSION_SECRET:-troque-esta-chave-de-sessao}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-certificado_session}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-43200}
      ENABLE_ADMIN_DOCS: ${ENABLE_ADMIN_DOCS:-true}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_WINDOW_SECONDS: ${LOGIN_WINDOW_SECONDS:-900}
      LOGIN_BLOCK_SECONDS: ${LOGIN_BLOCK_SECONDS:-900}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:28754,http://127.0.0.1:28754}
    depends_on:
      - postgres
    ports:
      - "29180:8000"
    volumes:
      - certificados_media:/app/data/certificados

  postgres:
    image: postgres:15-alpine
    container_name: certificado-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  certificados_media:
