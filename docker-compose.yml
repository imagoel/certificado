services:
  certificado-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certificado-web
    restart: unless-stopped
    ports:
      - "28754:80"
    depends_on:
      - certificado-api

  certificado-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: certificado-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CODE_PREFIX: ${CODE_PREFIX:-ABC}
      PUBLIC_VALIDATION_BASE_URL: ${PUBLIC_VALIDATION_BASE_URL:-http://localhost:29180/validar}
      CERTIFICADOS_MEDIA_DIR: /app/data/certificados
      CERTIFICADOS_MAX_UPLOAD_BYTES: ${CERTIFICADOS_MAX_UPLOAD_BYTES:-5242880}
      SESSION_SECRET: ${SESSION_SECRET:-troque-esta-chave-de-sessao}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    depends_on:
      - postgres
    ports:
      - "29180:8000"
    volumes:
      - certificados_media:/app/data/certificados

  postgres:
    image: postgres:15-alpine
    container_name: certificado-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  certificados_media:
