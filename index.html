<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Certificados</title>
  <link rel="stylesheet" href="styles.css?v=20260325" />
</head>
<body>
  <main class="container">
    <h1>Gerador de Certificados</h1>
    <p class="subtitle">Preencha os dados e gere seu certificado em segundos.</p>

    <section class="panel">
      <form id="cert-form" class="form">
        <label for="nome">Nome do participante</label>
        <input id="nome" type="text" placeholder="Ex.: Maria da Silva" required />

        <label for="curso">Nome do curso</label>
        <input id="curso" type="text" placeholder="Ex.: Introdução ao Git" required />

        <label for="data">Data de conclusão</label>
        <input id="data" type="date" required />

        <label for="logo">Logo da instituição (opcional)</label>
        <input id="logo" type="file" accept="image/*" />

        <label for="assinatura">Assinatura (opcional)</label>
        <input id="assinatura" type="file" accept="image/*" />

        <section class="asset-controls">
          <h2>Ajuste da Logo</h2>
          <label for="logoX">Posição X: <span id="logoXVal">600</span></label>
          <input id="logoX" type="range" min="80" max="1120" step="1" value="600" />

          <label for="logoY">Posição Y: <span id="logoYVal">95</span></label>
          <input id="logoY" type="range" min="60" max="260" step="1" value="95" />

          <label for="logoSize">Tamanho: <span id="logoSizeVal">150</span></label>
          <input id="logoSize" type="range" min="60" max="300" step="1" value="150" />

          <h2>Ajuste da Assinatura</h2>
          <label for="assinaturaX">Posição X: <span id="assinaturaXVal">330</span></label>
          <input id="assinaturaX" type="range" min="140" max="520" step="1" value="330" />

          <label for="assinaturaY">Posição Y: <span id="assinaturaYVal">662</span></label>
          <input id="assinaturaY" type="range" min="600" max="720" step="1" value="662" />

          <label for="assinaturaSize">Tamanho: <span id="assinaturaSizeVal">230</span></label>
          <input id="assinaturaSize" type="range" min="120" max="360" step="1" value="230" />
        </section>

        <div class="actions">
          <button type="submit">Gerar Certificado</button>
          <button id="download" type="button" disabled>Baixar PNG</button>
        </div>
      </form>
    </section>

    <section class="preview-wrap">
      <canvas id="canvas" width="1200" height="850" aria-label="Pré-visualização do certificado"></canvas>
    </section>
  </main>

  <script src="app.js?v=20260325"></script>
</body>
</html>
